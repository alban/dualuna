<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="landscape">
  <title>Dualuna: The Verdium Collector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    /* Landscape hint overlay for portrait mobile */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0;
      background: #000e1a;
      color: #88ccdd;
      font-family: Georgia, serif;
      font-size: 28px;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
      padding: 2em;
    }
    #rotate-hint .icon { font-size: 80px; display: block; margin-bottom: 24px; }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="rotate-hint"><div class="icon">&#x21BB;</div>Rotate your device to landscape</div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
