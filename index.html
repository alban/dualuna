<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="landscape">
  <title>Dualuna: The Verdium Collector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      overflow: hidden;
      touch-action: none;
    }
    #game-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
    }
    /* Landscape hint overlay for portrait mobile */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0;
      background: #000e1a;
      color: #88ccdd;
      font-family: Georgia, serif;
      font-size: 28px;
      justify-content: center;
      align-items: center;
      text-align: center;
      z-index: 9999;
      padding: 2em;
    }
    #rotate-hint .icon {
      font-size: 80px; display: block; margin-bottom: 24px;
      animation: tilt 2s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes tilt {
      0%   { transform: rotate(0deg); }
      40%  { transform: rotate(-90deg); }
      60%  { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }
    #rotate-hint .buttons { display: flex; gap: 16px; margin-top: 32px; }
    #rotate-hint button {
      background: #0a1a2a; border: 1px solid #334455; color: #88ccdd;
      font-family: Georgia, serif; font-size: 48px;
      padding: 12px 24px; border-radius: 8px; cursor: pointer;
    }
    #rotate-hint button:active { color: #ffffff; }
    #rotate-hint a {
      position: absolute; bottom: 12px; right: 16px;
      color: #8899aa; font-family: Georgia, serif; font-size: 12px;
      text-decoration: none; text-shadow: 0 1px 3px #000;
    }
    #rotate-hint a:hover { color: #88aacc; }
    @media (orientation: portrait) {
      #rotate-hint { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="rotate-hint">
    <div class="icon">📱</div>
    <div class="buttons">
      <button onclick="(document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()).catch(()=>{})">⛶</button>
      <button onclick="window.location.reload()">🔄</button>
    </div>
    <a href="https://github.com/alban/dualuna" target="_blank">github.com/alban/dualuna</a>
  </div>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
